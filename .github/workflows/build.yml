name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install required system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libasound2-dev \
            libcurl4-openssl-dev \
            libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libglib2.0-dev libgl1-mesa-dev libgtk-3-dev

      - name: Install WebKit (name differs between Ubuntu 22.04 / 24.04)
        run: |
          sudo apt-get install -y libwebkit2gtk-4.0-dev 2>/dev/null || \
          sudo apt-get install -y libwebkit2gtk-4.1-dev 2>/dev/null || \
          echo "WebKit unavailable — JUCE_WEB_BROWSER=0 will suppress the dependency"

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: /tmp/JUCE
          key: juce-${{ runner.os }}-main

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/juce-framework/JUCE.git /tmp/JUCE

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DJUCE_DIR=/tmp/JUCE \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-DJUCE_WEB_BROWSER=0"

      - name: Build VST3
        run: cmake --build build --target BasicSynth_VST3
